name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff check)
        run: ruff check api/ tests/

      - name: Format check (ruff format)
        run: ruff format --check api/ tests/

  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://test:test@localhost/test
      REVIEW_API_KEY: test-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-api.txt && pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=api --cov-report=term-missing --cov-fail-under=80
