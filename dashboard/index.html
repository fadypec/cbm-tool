<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CBM Facility Explorer</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet 1.9 -->
    <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
    <!-- Custom -->
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────── -->
<nav id="navbar" class="d-flex align-items-center justify-content-between px-3">
    <span id="app-title">CBM Facility Explorer</span>
    <span id="stats-bar"></span>
    <div id="search-wrap">
        <input id="search-input" type="text" placeholder="Search facilities…" autocomplete="off">
        <ul id="search-results"></ul>
    </div>
</nav>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<div id="main">

    <!-- Sidebar -->
    <aside id="sidebar">

        <!-- Panel: country list -->
        <div id="panel-list" class="side-panel">
            <div class="side-header">
                <span class="side-title">Countries</span>
                <span id="country-count" class="side-badge"></span>
            </div>
            <div id="country-list" class="side-scroll">
                <div class="side-placeholder">Loading…</div>
            </div>
        </div>

        <!-- Panel: country detail -->
        <div id="panel-detail" class="side-panel" style="display:none">
            <div class="side-header">
                <button id="back-btn" onclick="showPanel('list')" title="Back to country list">←</button>
                <span id="detail-title" class="side-title ms-2"></span>
            </div>
            <div id="detail-loading" class="side-placeholder">Loading…</div>
            <div id="detail-content" class="side-scroll" style="display:none">
                <div class="side-section">
                    <div class="side-section-label">FORM COMPLIANCE</div>
                    <div id="compliance-legend" class="compliance-legend">
                        <span><span class="badge-sub">●</span> Substantive</span>
                        <span><span class="badge-ntd">○</span> Nothing to declare</span>
                        <span><span class="badge-abs">·</span> Absent</span>
                    </div>
                    <div id="compliance-grid"></div>
                </div>
                <div class="side-section">
                    <div class="side-section-label">DECLARED FACILITIES (FORM A1)</div>
                    <div id="facility-list"></div>
                </div>
            </div>
        </div>

    </aside>

    <!-- Map -->
    <div id="map"></div>

</div>

<!-- ── Entity modal ────────────────────────────────────────────────────── -->
<div class="modal fade" id="entity-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-title">Facility History</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>
</div>

<!-- ── Scripts ─────────────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/app.js"></script>

</body>
</html>
