services:
  db:
    image: postgis/postgis:16-3.4
    container_name: cbm_db
    environment:
      POSTGRES_DB:       cbm
      POSTGRES_USER:     cbm
      POSTGRES_PASSWORD: cbm
    ports:
      - "5432:5432"
    volumes:
      - cbm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbm -d cbm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cbm_pgdata:
