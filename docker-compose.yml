services:
  db:
    image: postgis/postgis:17-3.5
    container_name: cbm_db
    environment:
      POSTGRES_DB:       cbm
      POSTGRES_USER:     ${POSTGRES_USER:-cbm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or environment}
    ports:
      - "5432:5432"
    volumes:
      - cbm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cbm} -d cbm"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: cbm_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cbm}:${POSTGRES_PASSWORD:?err}@db:5432/cbm
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

volumes:
  cbm_pgdata:
